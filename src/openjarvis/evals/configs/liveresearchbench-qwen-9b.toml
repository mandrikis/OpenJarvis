# LiveResearchBench (Salesforce): Qwen3.5-9B (vLLM)
[meta]
name = "liveresearchbench-qwen-9b"
description = "LiveResearchBench on Qwen/Qwen3.5-9B (vLLM)"

[defaults]
temperature = 0.0
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
engine = "cloud"
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/qwen-9b/liveresearchbench/"
seed = 42

[[models]]
name = "Qwen/Qwen3.5-9B"
engine = "vllm"
num_gpus = 1

[[benchmarks]]
name = "liveresearchbench"
backend = "jarvis-direct"
max_samples = 50
