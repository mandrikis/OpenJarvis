# LiveResearchBench (Salesforce): LFM2.5-1.2B-Instruct (vLLM, 1 GPU)
[meta]
name = "liveresearchbench-lfm-1.2b"
description = "LiveResearchBench (Salesforce) on LiquidAI/LFM2.5-1.2B-Instruct"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 16384

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/lfm-1.2b/liveresearchbench/"
seed = 42

[[models]]
name = "LiquidAI/LFM2.5-1.2B-Instruct"
engine = "vllm"
num_gpus = 1

[[benchmarks]]
name = "liveresearchbench"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
