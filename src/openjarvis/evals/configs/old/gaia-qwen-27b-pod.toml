# GAIA eval: Qwen3.5-27B-FP8 (Pod model server)

[meta]
name = "gaia-qwen-27b-pod"
description = "GAIA on Qwen/Qwen3.5-27B-FP8 (Pod server)"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/qwen-27b/gaia/"
seed = 42

[[models]]
name = "qwen-27b"
engine = "vllm"
vllm_host = "http://localhost:8001"

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 50
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read"]
max_turns = 50
