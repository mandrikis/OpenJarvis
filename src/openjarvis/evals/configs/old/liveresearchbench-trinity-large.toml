# LiveResearchBench (Salesforce): Trinity-Large-Thinking-FP8-Block (vLLM, TP=8)
[meta]
name = "liveresearchbench-trinity-large"
description = "LiveResearchBench (Salesforce) on Trinity-Large-Thinking-FP8-Block"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 16384

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/trinity-large/liveresearchbench/"
seed = 42

[[models]]
name = "arcee-ai/Trinity-Large-Thinking-FP8-Block"
engine = "vllm"
num_gpus = 8

[[benchmarks]]
name = "liveresearchbench"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
