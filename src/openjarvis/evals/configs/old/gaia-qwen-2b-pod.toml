# GAIA eval: Qwen3.5-2B (Pod model server)

[meta]
name = "gaia-qwen-2b-pod"
description = "GAIA on Qwen/Qwen3.5-2B (Pod server)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 16384
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/qwen-2b/gaia/"
seed = 42

[engine.vllm]
host = "http://localhost:8004"

[[models]]
name = "Qwen/Qwen3.5-2B"
engine = "vllm"

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 50
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read"]
max_turns = 50
