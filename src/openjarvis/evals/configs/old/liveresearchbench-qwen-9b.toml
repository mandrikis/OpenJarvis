# LiveResearchBench (Salesforce): Qwen3.5-9B (vLLM, 1 GPU)
[meta]
name = "liveresearchbench-qwen-9b"
description = "LiveResearchBench (Salesforce) on Qwen/Qwen3.5-9B"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 16384

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/qwen-9b/liveresearchbench/"
seed = 42

[[models]]
name = "Qwen/Qwen3.5-9B"
engine = "vllm"
num_gpus = 1

[[benchmarks]]
name = "liveresearchbench"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 10
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
