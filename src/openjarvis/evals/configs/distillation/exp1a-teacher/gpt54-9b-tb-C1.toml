# Distillation Experiment Config
# Experiment: exp1a-teacher/gpt54-tb-C1
# Teacher: gpt-5.4 (openai)
# Student: Qwen/Qwen3.5-9B (vllm)
# Benchmark: taubench
# Data config: C1 — Zero test data — external traces only (GeneralThought + ADP)
# Budget: standard (15 tool calls, $2.00)
# Gate: standard (min_improvement=0.0, max_regression=0.05)
# Autonomy: auto
# Iterative sessions: 1


[intelligence]
default_model = "Qwen/Qwen3.5-9B"

[engine]
default = "vllm"

[engine.vllm]
host = "http://localhost:8001"

[learning.distillation]
enabled = true
autonomy_mode = "auto"
teacher_model = "gpt-5.4"
max_cost_per_session_usd = 2.0
max_tool_calls_per_diagnosis = 15

[learning.distillation.gate]
min_improvement = 0.0
max_regression = 0.05
benchmark_subsample_size = 50

[learning.distillation.benchmark]
synthesis_feedback_threshold = 0.7
max_benchmark_size = 200

[learning.distillation.experiment]
# Metadata for the experiment runner (not read by distillation itself)
experiment_id = "exp1a-teacher/gpt54-tb-C1"
teacher_key = "gpt54"
student_key = "9b"
benchmark = "taubench"
data_config = "C1"
trace_source = "external"
benchmark_queries_visible = false
budget_key = "standard"
gate_key = "standard"
iterative_sessions = 1
