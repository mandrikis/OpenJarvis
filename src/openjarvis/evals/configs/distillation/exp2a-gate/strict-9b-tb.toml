# Distillation Experiment Config
# Experiment: exp2a-gate/strict-tb
# Teacher: claude-opus-4-6 (anthropic)
# Student: Qwen/Qwen3.5-9B (vllm)
# Benchmark: taubench
# Data config: C2 — Test queries only — benchmark traces visible, answers hidden
# Budget: standard (15 tool calls, $2.00)
# Gate: strict (min_improvement=0.02, max_regression=0.02)
# Autonomy: auto
# Iterative sessions: 1


[intelligence]
default_model = "Qwen/Qwen3.5-9B"

[engine]
default = "vllm"

[engine.vllm]
host = "http://localhost:8001"

[learning.distillation]
enabled = true
autonomy_mode = "auto"
teacher_model = "claude-opus-4-6"
max_cost_per_session_usd = 2.0
max_tool_calls_per_diagnosis = 15

[learning.distillation.gate]
min_improvement = 0.02
max_regression = 0.02
benchmark_subsample_size = 50

[learning.distillation.benchmark]
synthesis_feedback_threshold = 0.7
max_benchmark_size = 200

[learning.distillation.experiment]
# Metadata for the experiment runner (not read by distillation itself)
experiment_id = "exp2a-gate/strict-tb"
teacher_key = "opus"
student_key = "9b"
benchmark = "taubench"
data_config = "C2"
trace_source = "benchmark"
benchmark_queries_visible = true
budget_key = "standard"
gate_key = "strict"
iterative_sessions = 1
