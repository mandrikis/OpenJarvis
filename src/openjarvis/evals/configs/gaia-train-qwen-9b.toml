# GAIA train slice (20% of seed-42-shuffled validation): Qwen3.5-9B (vLLM, 1 GPU)
# In-domain ablation — teacher's input only. Never use this for final eval.
[meta]
name = "gaia-train-qwen-9b"
description = "GAIA train slice on Qwen/Qwen3.5-9B"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/qwen-9b/gaia-train/"
seed = 42

[[models]]
name = "Qwen/Qwen3.5-9B"
engine = "vllm"
num_gpus = 1

[[benchmarks]]
name = "gaia"
subset = "train"
backend = "jarvis-agent"
agent = "monitor_operative"
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read"]
